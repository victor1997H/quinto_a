# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt
    
  
    - name: Test with pytest
      run: pytest

    - name: Ejecutar la aplicación
      run: python app.py
    
    - name: simular el deploy
      run: echo "Simular que se esta desplegando"

    -name: Construir la imagen de Docker
      run: docker build -t ghcr.io./devoops/hola-victorhualpa:1.0.0 .

    - name: Iniciar sesión en GitHub Container Registry
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin